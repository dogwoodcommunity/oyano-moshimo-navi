name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-and-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web
        run: pnpm --filter web run typecheck

      - name: Typecheck mobile
        run: pnpm --filter mobile run typecheck

      - name: Build web
        run: pnpm --filter web run build

      - name: Smoke web
        run: |
          pnpm --filter web run start -- -p 3000 &
          sleep 5
          node scripts/smoke-web.mjs http://localhost:3000
